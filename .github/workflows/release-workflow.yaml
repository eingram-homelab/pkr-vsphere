---
name: Release Workflow

on:
  push:
    branches: [main]
    paths:
      - '**.pkr.hcl'
  workflow_dispatch:
    inputs:
      directories:
        description: 'Space-separated list of packer directories to build (e.g. rocky9/packer rocky10/packer). Required when running manually.'
        required: true
        type: string

jobs:
  validate:
    uses: eingram-homelab/reusable_workflows/.github/workflows/_packer-build.yaml@main
    name: Build vSphere Template
    with:
      directories: ${{ inputs.directories || '' }}
    secrets:
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

  gate:
    needs: [validate]
    if: always()
    runs-on: arc-runners
    steps:
      - name: Check validation result
        run: |
          result="${{ needs.validate.result }}"
          if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
            exit 1
          fi
